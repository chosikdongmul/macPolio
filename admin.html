<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #0f0f0f; color: #e5e5e5; }

    /* ── 로그인 ── */
    #login-screen {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0f0f0f; z-index: 999;
    }
    #login-screen.hidden { display: none; }
    .login-box {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px;
      padding: 40px 48px; width: 360px; text-align: center;
    }
    .login-box h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: #fff; }
    .login-box p  { font-size: 12px; color: #666; margin-bottom: 24px; }
    .login-input {
      width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
      padding: 10px 14px; font-size: 14px; color: #e5e5e5; outline: none;
      margin-bottom: 12px; transition: border-color 0.15s;
    }
    .login-input:focus { border-color: #555; }
    .login-btn {
      width: 100%; background: #2563eb; color: white; border: none;
      border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .login-btn:hover { background: #1d4ed8; }
    .login-error { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }

    /* ── 레이아웃 ── */
    #app { display: flex; height: 100vh; }
    #app.hidden { display: none; }

    /* 사이드바 */
    #sidebar {
      width: 220px; min-width: 220px; background: #141414;
      border-right: 1px solid #222; display: flex; flex-direction: column;
      padding: 20px 0;
    }
    .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid #222; margin-bottom: 12px; }
    .sidebar-logo .title { font-size: 14px; font-weight: 600; color: #fff; }
    .sidebar-logo .sub   { font-size: 11px; color: #555; margin-top: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; font-size: 13px; color: #888; cursor: pointer;
      border-radius: 0; transition: background 0.1s, color 0.1s;
      border-left: 2px solid transparent;
    }
    .nav-item:hover { background: #1e1e1e; color: #ccc; }
    .nav-item.active { background: #1e1e1e; color: #fff; border-left-color: #2563eb; }
    .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }

    .sidebar-bottom {
      margin-top: auto; padding: 16px 20px;
      border-top: 1px solid #222;
    }
    .logout-btn {
      width: 100%; background: none; border: 1px solid #333; border-radius: 7px;
      color: #666; padding: 7px; font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .logout-btn:hover { border-color: #555; color: #aaa; }

    /* 메인 콘텐츠 */
    #main { flex: 1; overflow-y: auto; padding: 32px 36px; }
    .page { display: none; }
    .page.active { display: block; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-header h2 { font-size: 20px; font-weight: 600; color: #fff; }

    /* 버튼 공통 */
    .btn { padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #1e1e1e; color: #aaa; border: 1px solid #333; }
    .btn-secondary:hover { background: #252525; color: #ddd; }
    .btn-danger { background: #1e1e1e; color: #ef4444; border: 1px solid #3a1818; }
    .btn-danger:hover { background: #2a1515; }
    .btn-success { background: #166534; color: #4ade80; border: 1px solid #14532d; }
    .btn-success:hover { background: #15803d; }

    /* 프로젝트 카드 리스트 */
    .project-list { display: flex; flex-direction: column; gap: 10px; }
    .project-card {
      background: #1a1a1a; border: 1px solid #252525; border-radius: 10px;
      padding: 14px 18px; display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .project-card:hover { border-color: #333; background: #1e1e1e; }
    .project-card.selected { border-color: #2563eb; background: #162040; }
    .project-card .thumb {
      width: 52px; height: 42px; border-radius: 6px; background: #2a2a2a;
      object-fit: cover; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .project-card .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
    .project-card .info { flex: 1; min-width: 0; }
    .project-card .info .ptitle { font-size: 13px; font-weight: 500; color: #e5e5e5; }
    .project-card .info .pmeta  { font-size: 11px; color: #555; margin-top: 2px; }
    .project-card .actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
    .project-card:hover .actions { opacity: 1; }

    /* 편집 패널 */
    #edit-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 420px;
      background: #141414; border-left: 1px solid #222;
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.2s ease;
      z-index: 50;
    }
    #edit-panel.open { transform: translateX(0); }
    .panel-header {
      padding: 20px 24px; border-bottom: 1px solid #222;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .panel-header h3 { font-size: 15px; font-weight: 600; color: #fff; }
    .panel-close { background: none; border: none; color: #555; font-size: 22px; cursor: pointer; line-height: 1; padding: 0; }
    .panel-close:hover { color: #aaa; }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* 폼 요소 */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 11px; color: #666; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 7px;
      padding: 8px 12px; font-size: 13px; color: #e5e5e5; outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #2563eb; }
    .form-select { cursor: pointer; }
    .form-select option { background: #1a1a1a; }
    .form-textarea { resize: vertical; min-height: 72px; }

    /* 이미지 파일 피커 */
    .img-picker-wrap { display: flex; flex-direction: column; gap: 6px; }
    .img-picker-row { display: flex; gap: 6px; align-items: center; }
    .img-picker-row input { flex: 1; }
    .pick-btn {
      flex-shrink: 0; background: #222; border: 1px solid #333; border-radius: 6px;
      color: #aaa; font-size: 11px; padding: 7px 10px; cursor: pointer;
      white-space: nowrap; transition: all 0.15s;
    }
    .pick-btn:hover { background: #2a2a2a; color: white; border-color: #444; }
    .img-preview-box {
      width: 100%; height: 100px; border-radius: 7px; overflow: hidden;
      background: #1a1a1a; border: 1px dashed #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      color: #444; font-size: 12px; position: relative;
    }
    .img-preview-box img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0;
    }
    .img-preview-box.empty::before { content: '미리보기'; }

    /* 사진 경로 목록 */
    .photo-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .photo-row { display: flex; flex-direction: column; gap: 4px; padding: 8px; background: #1a1a1a; border: 1px solid #222; border-radius: 7px; }
    .photo-row-top { display: flex; align-items: center; gap: 6px; }
    .photo-row-top input { flex: 1; }
    .photo-row .del-btn { background: none; border: none; color: #555; font-size: 16px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
    .photo-row .del-btn:hover { color: #ef4444; }
    .photo-thumb-preview {
      width: 100%; height: 70px; border-radius: 5px; overflow: hidden;
      background: #111; border: 1px dashed #222;
      display: none; position: relative;
    }
    .photo-thumb-preview.visible { display: block; }
    .photo-thumb-preview img { width: 100%; height: 100%; object-fit: cover; }
    .add-photo-btn {
      margin-top: 6px; background: none; border: 1px dashed #333; border-radius: 6px;
      color: #555; font-size: 12px; padding: 6px; width: 100%; cursor: pointer; transition: all 0.15s;
    }
    .add-photo-btn:hover { border-color: #555; color: #aaa; }

    .panel-footer {
      padding: 16px 24px; border-top: 1px solid #222; flex-shrink: 0;
      display: flex; gap: 8px;
    }

    /* 기본 정보 섹션 */
    .info-section { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .info-section h3 { font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* 카테고리 관리 */
    .cat-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .cat-chip {
      display: flex; align-items: center; gap: 6px;
      background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 20px;
      padding: 4px 12px 4px 14px; font-size: 12px; color: #aaa;
    }
    .cat-chip .del { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; padding: 0; }
    .cat-chip .del:hover { color: #ef4444; }

    /* 하단 저장 바 */
    #save-bar {
      position: fixed; bottom: 0; left: 220px; right: 0;
      background: #141414; border-top: 1px solid #222;
      padding: 12px 36px; display: flex; align-items: center; justify-content: space-between;
      z-index: 40;
    }
    .save-hint { font-size: 12px; color: #555; }
    .save-hint span { color: #febc2e; }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Admin</h1>
    <p>포트폴리오 관리자 페이지</p>
    <input class="login-input" type="password" id="pw-input" placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 틀렸습니다.</div>
    <p style="font-size:11px;color:#444;margin-top:16px;">기본 비밀번호: <code style="color:#666;">admin1234</code></p>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="app" class="hidden">

  <!-- 사이드바 -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="title">Portfolio Admin</div>
      <div class="sub">콘텐츠 관리</div>
    </div>
    <div class="nav-item active" onclick="showPage('projects')" id="nav-projects">
      <span class="icon">🗂️</span> 프로젝트
    </div>
    <div class="nav-item" onclick="showPage('owner')" id="nav-owner">
      <span class="icon">👤</span> 기본 정보
    </div>
    <div class="nav-item" onclick="showPage('categories')" id="nav-categories">
      <span class="icon">🏷️</span> 카테고리
    </div>
    <div class="sidebar-bottom">
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- 메인 -->
  <div id="main">

    <!-- 프로젝트 목록 -->
    <div class="page active" id="page-projects">
      <div class="page-header">
        <h2>프로젝트</h2>
        <button class="btn btn-primary" onclick="newProject()">+ 프로젝트 추가</button>
      </div>
      <div class="project-list" id="project-list"></div>
    </div>

    <!-- 기본 정보 -->
    <div class="page" id="page-owner">
      <div class="page-header">
        <h2>기본 정보</h2>
      </div>
      <div class="info-section">
        <h3>프로필</h3>
        <div class="form-group">
          <label class="form-label">이름</label>
          <input class="form-input" id="owner-name" oninput="syncOwner()" />
        </div>
        <div class="form-group">
          <label class="form-label">Bio</label>
          <input class="form-input" id="owner-bio" oninput="syncOwner()" />
        </div>
      </div>
      <div class="info-section">
        <h3>연락처 / SNS</h3>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input class="form-input" id="owner-email" type="email" oninput="syncOwner()" />
        </div>
        <div class="form-group">
          <label class="form-label">Instagram URL</label>
          <input class="form-input" id="owner-instagram" oninput="syncOwner()" />
        </div>
        <div class="form-group">
          <label class="form-label">Behance URL</label>
          <input class="form-input" id="owner-behance" oninput="syncOwner()" />
        </div>
      </div>
    </div>

    <!-- 카테고리 -->
    <div class="page" id="page-categories">
      <div class="page-header">
        <h2>카테고리</h2>
      </div>
      <div class="info-section">
        <h3>카테고리 목록</h3>
        <div class="cat-list" id="cat-list"></div>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <input class="form-input" id="new-cat-input" placeholder="새 카테고리 이름"
            onkeydown="if(event.key==='Enter')addCategory()" style="flex:1;" />
          <button class="btn btn-primary" onclick="addCategory()">추가</button>
        </div>
      </div>
    </div>

    <div style="height:64px;"></div><!-- save-bar 여백 -->
  </div>

  <!-- 편집 패널 -->
  <div id="edit-panel">
    <div class="panel-header">
      <h3 id="panel-title">프로젝트 편집</h3>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
    <div class="panel-footer">
      <button class="btn btn-danger" id="panel-delete-btn" onclick="deleteCurrentProject()">삭제</button>
      <div style="flex:1;"></div>
      <button class="btn btn-secondary" onclick="closePanel()">취소</button>
      <button class="btn btn-primary" onclick="saveCurrentProject()">저장</button>
    </div>
  </div>

  <!-- JSON 복사 팝업 -->
  <div id="json-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;
       display:none;align-items:center;justify-content:center;">
    <div style="background:#1a1a1a;border:1px solid #333;border-radius:12px;width:680px;max-width:90vw;
                max-height:80vh;display:flex;flex-direction:column;padding:24px;gap:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:15px;font-weight:700;color:#fff;">📋 content.json</div>
        <button onclick="closeJSONPopup()" style="background:none;border:none;color:#888;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div style="font-size:12px;color:#6b7280;">아래 전체를 복사해서 <code style="color:#4da3e8;">data/content.json</code> 파일에 붙여넣으세요.</div>
      <textarea id="json-output" readonly
        style="flex:1;min-height:360px;background:#0d0d0d;border:1px solid #333;border-radius:8px;
               color:#a8e6a3;font-family:monospace;font-size:12px;padding:12px;
               resize:none;outline:none;line-height:1.5;"></textarea>
      <button onclick="copyJSON()" id="json-copy-btn"
        style="background:#2563eb;color:#fff;border:none;border-radius:8px;padding:10px;
               font-size:14px;font-weight:600;cursor:pointer;">
        클립보드에 복사
      </button>
    </div>
  </div>

  <!-- 하단 저장 바 -->
  <div id="save-bar">
    <div class="save-hint">자동저장(안전장치) 켜짐 · 명시적으로 저장하려면 <span>저장</span> 버튼 사용</div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="saveToLocal()" style="font-size:13px;padding:9px 20px;border-color:#444;">
        💾 저장
      </button>
      <button class="btn btn-success" onclick="showJSONPopup()" style="font-size:13px;padding:9px 20px;">
        📋 JSON 복사
      </button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   비밀번호 (로컬 전용, 서버 없음)
   변경하려면 아래 ADMIN_PW 값을 수정
   ═══════════════════════════════════════════ */
const ADMIN_PW = '1';
const SESSION_KEY = 'portfolio_admin_ok';

/* ═══════════════════════════════════════════
   상태
   ═══════════════════════════════════════════ */
const DATA_KEY = 'portfolio_data';

// 기본 데이터 (localStorage에 없을 때만 사용)
const DEFAULT_DATA = {
  owner: {
    name: "홍길동",
    bio: "사진작가 / 비주얼 디렉터",
    contact: { email: "hello@example.com", instagram: "https://instagram.com/username", behance: "https://behance.net/username" }
  },
  projects: [
    { id:"project-01", title:"Dodo Pizza",   category:"브랜딩",    thumbnail:"", description:"도도 피자의 새로운 브랜드 아이덴티티를 담은 비주얼 캠페인.", photos:[], year:2024, position:{x:540,y:160} },
    { id:"project-02", title:"Visamie",       category:"광고",      thumbnail:"", description:"글로벌 비자 서비스 플랫폼 Visamie의 광고 캠페인.",         photos:[], year:2024, position:{x:240,y:220} },
    { id:"project-03", title:"Logofolio",     category:"브랜딩",    thumbnail:"", description:"다양한 클라이언트를 위해 제작한 로고 컬렉션.",              photos:[], year:2023, position:{x:880,y:190} },
    { id:"project-04", title:"DALA CAMP",     category:"포트레이트",thumbnail:"", description:"야외 캠핑 브랜드 DALA CAMP의 라이프스타일 포트레이트.",    photos:[], year:2023, position:{x:200,y:510} },
    { id:"project-05", title:"Megacampus",    category:"공간",      thumbnail:"", description:"교육 플랫폼 메가캠퍼스의 공간 촬영 프로젝트.",              photos:[], year:2024, position:{x:540,y:500} },
    { id:"project-06", title:"Geely × Major", category:"광고",      thumbnail:"", description:"지리 자동차와 메이저 콜라보레이션 광고 캠페인.",            photos:[], year:2024, position:{x:880,y:470} },
    { id:"project-07", title:"Skin.Club",     category:"브랜딩",    thumbnail:"", description:"게이밍 스킨 플랫폼 Skin.Club의 비주얼 아이덴티티.",        photos:[], year:2024, position:{x:1160,y:310} },
    { id:"project-08", title:"DFC",           category:"광고",      thumbnail:"", description:"DFC 브랜드 광고 캠페인.",                                  photos:[], year:2023, position:{x:380,y:380} }
  ],
  categories: ["브랜딩", "광고", "포트레이트", "공간"]
};

// localStorage에서 불러오기, 없으면 기본값
function loadData() {
  try {
    const saved = localStorage.getItem(DATA_KEY);
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

// 변경될 때마다 localStorage에 자동 저장
function persistData() {
  localStorage.setItem(DATA_KEY, JSON.stringify(DATA));
}

let DATA = loadData();
let editingId = null;

/* ═══════════════════════════════════════════
   로그인
   ═══════════════════════════════════════════ */
function doLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PW) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    initApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

/* ═══════════════════════════════════════════
   초기화
   ═══════════════════════════════════════════ */
function initApp() {
  renderOwnerForm();
  renderProjectList();
  renderCategories();
}

// 세션 유지

function photoRowHTML(src, i) {

  return `<div class="photo-row" id="photo-row-${i}">

    </div>
    <div class="photo-thumb-preview ${hasSrc ? 'visible' : ''}" id="photo-preview-${i}">
      ${hasSrc ? `<img src="${esc(src)}" alt="">` : ''}
    </div>
    <input type="file" id="photo-file-${i}" accept="image/*" style="display:none" onchange="onPhotoFilePicked(this,${i})" />
  </div>`;
}

function addPhotoRow() {
  const list = document.getElementById('photo-list');
  const i = list.children.length;
  const div = document.createElement('div');
  div.innerHTML = photoRowHTML('', i);

function removePhotoRow(i) {

// 폴더 선택 → 그 안의 사진 파일을 전부 읽어서(Base64) 목록에 채움
// (경로만 저장하면 실제 파일이 배포 위치에 없을 때 깨지므로, 파일 내용 자체를 읽어 저장한다)
function onPhotoFolderPicked(input) {
  const files = Array.from(input.files || []).filter(f => /\.(jpe?g|png|gif|webp|avif)$/i.test(f.name));
  if (!files.length) { showToast('❌ 폴더 안에 이미지 파일이 없습니다'); input.value = ''; return; }

  // 자연 정렬 (01, 02 ... 10 순서로)
  files.sort((a, b) => a.webkitRelativePath.localeCompare(b.webkitRelativePath, undefined, { numeric: true }));

  const list = document.getElementById('photo-list');
  list.innerHTML = ''; // 폴더 내용 기준으로 목록을 새로 채움

  let loaded = 0;
  files.forEach((file, i) => {
    const div = document.createElement('div');
    div.innerHTML = photoRowHTML('', i);
    list.appendChild(div.firstElementChild);

    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      const pathInput = document.querySelector(`#photo-row-${i} .photo-src`);
      if (pathInput) pathInput.value = base64;
      const preview = document.getElementById('photo-preview-' + i);
      if (preview) {
        preview.classList.add('visible');
        preview.innerHTML = `<img src="${base64}" alt="">`;
      }
      loaded++;
      if (loaded === files.length) showToast(`✅ ${files.length}장 자동 감지됨`);
    };
    reader.readAsDataURL(file);
  });

  input.value = '';
}

    const box = document.getElementById('thumb-preview-box');

    box.innerHTML = `<img src="${base64}" alt="">`;
  };
  reader.readAsDataURL(file);
}

/* ── Google Drive URL 변환 ── */
function extractGdriveId(url) {
  // https://drive.google.com/file/d/FILE_ID/view
  // https://drive.google.com/open?id=FILE_ID
  // https://drive.google.com/uc?id=FILE_ID
  const patterns = [
    /\/file\/d\/([a-zA-Z0-9_-]{10,})/,
    /[?&]id=([a-zA-Z0-9_-]{10,})/,
    /\/d\/([a-zA-Z0-9_-]{10,})/,
  ];
  for (const pat of patterns) {
    const m = url.match(pat);
    if (m) return m[1];
  }
  return null;
}

function gdriveConvert(inputId, previewBoxId) {
  const input = document.getElementById(inputId);
  const raw = input.value.trim();
  const id = extractGdriveId(raw);
  if (!id) {
    alert('Google Drive 공유 링크를 먼저 입력/붙여넣기 하세요.\n예: https://drive.google.com/file/d/.../view');
    return;
  }
  const direct = `https://lh3.googleusercontent.com/d/${id}`;
  input.value = direct;
  // 미리보기 업데이트
  const box = document.getElementById(previewBoxId);
  if (box) {
    box.classList.remove('empty');
    box.innerHTML = `<img src="${direct}" alt="" onerror="this.parentElement.innerHTML='<span style=color:#ef4444;font-size:12px>이미지 로드 실패 — Drive 파일이 공개 설정인지 확인하세요</span>'">`;
  }
}

function gdriveConvertPhoto(i) {
  const input = document.querySelector(`#photo-row-${i} .photo-src`);
  if (!input) return;
  const raw = input.value.trim();
  const id = extractGdriveId(raw);
  if (!id) {
    alert('Google Drive 공유 링크를 먼저 입력/붙여넣기 하세요.');
    return;
  }
  const direct = `https://lh3.googleusercontent.com/d/${id}`;
  input.value = direct;
  const preview = document.getElementById('photo-preview-' + i);
  if (preview) {
    preview.classList.add('visible');
    preview.innerHTML = `<img src="${direct}" alt="" onerror="this.parentElement.innerHTML='<span style=color:#ef4444;font-size:12px>로드 실패 — 공개 설정 확인</span>'">`;
  }
}

function getVal(id, fallback = '') {
  const el = document.getElementById(id);
  return el ? el.value.trim() : fallback;
}

function saveCurrentProject() {
  try {
    if (!editingId) { showToast('❌ 먼저 프로젝트를 선택하세요'); return; }
    const idx = DATA.projects.findIndex(x => x.id === editingId);
    if (idx === -1) { showToast('❌ 프로젝트를 찾을 수 없습니다'); return; }

    const photos = Array.from(
      document.querySelectorAll('#panel-body .photo-src')
    ).map(el => el.value.trim()).filter(Boolean);

    DATA.projects[idx] = {
      ...DATA.projects[idx],
      title:       getVal('p-title') || DATA.projects[idx].title,
      category:    getVal('p-category') || DATA.projects[idx].category,
      year:        parseInt(getVal('p-year')) || DATA.projects[idx].year,
      visible:     document.getElementById('p-visible')?.checked !== false,
      thumbnail:   getVal('p-thumbnail'),
      description: getVal('p-desc'),
      link:        getVal('p-link'),
      photos,
      position: {
        x: parseInt(getVal('p-x')) || DATA.projects[idx].position?.x || 400,
        y: parseInt(getVal('p-y')) || DATA.projects[idx].position?.y || 300,
      }
    };

    persistData();

    const titleEl = document.getElementById('panel-title');
    if (titleEl) titleEl.textContent = DATA.projects[idx].title;
    renderProjectList();
    showToast('✅ 저장되었습니다');

    // 버튼 시각 피드백
    const btn = document.querySelector('.panel-footer .btn-primary');
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ 저장됨';
      btn.style.background = '#166534';
      setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1500);
    }
  } catch (err) {
    showToast('❌ 오류: ' + err.message);
    console.error('saveCurrentProject error:', err);
  }
}

function deleteCurrentProject() {
  if (!editingId) return;
  if (!confirm('이 프로젝트를 삭제할까요?')) return;
  DATA.projects = DATA.projects.filter(x => x.id !== editingId);
  persistData();
  closePanel();
}

function newProject() {
  const id = 'project-' + Date.now();
  DATA.projects.push({
    id, title: '새 프로젝트', category: DATA.categories[0] || '',
    thumbnail: '', description: '', photos: [], year: new Date().getFullYear(),
    position: { x: 400 + Math.random()*200, y: 300 + Math.random()*100 }
  });
  renderProjectList();
  openEditPanel(id);
}

function downloadJSON() {
  // 패널이 열려있으면 먼저 저장
  if (editingId) saveCurrentProject();

  const json = JSON.stringify(DATA, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'content.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('⬇ content.json 다운로드 완료');
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#93c5fd;border:1px solid #2563eb;border-radius:8px;padding:8px 18px;font-size:13px;z-index:999;transition:opacity 0.2s;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
}
</script>
</body>
</html>
